<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3漢字クイズ</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header>
<h1>N3漢字クイズ</h1>
    </header>
    <!--メインセクション-->
    <main>
        <!--クイズの表示エリア-->
        <div class ="content" id="quizbackground">
            <h1 id="starterText">ボタンを押してクイズを始めましょう。</h1>
        <button type="button" class="startButton" id="startButton">スタート</button>
        <div class="hidden" id="gameContent">
        <div class="scoreCard" id="scorecard">正解数: </div>
        <div class="timeLeft" id="timeLeft">残り時間:</div>
        <div id="questionCounter"></div>
        <div class="quizInstruction">正しい音読みを選んでください：</div>
        <div class="questionText" id="questionText">問題</div>
        <div class="answers">
            <button type="button" class="answerBtn" id="optionA">optionA</button>
            <button type="button" class="answerBtn" id="optionB">optionB</button>
            <button type="button" class="answerBtn" id="optionC">optionC</button>
            <button type="button" class="answerBtn" id="optionD">optionD</button>
        </div>
        </div>
        <div class="finalScoreText hidden" id="finalScoreText"></div>
        <div id="missedQuestionsContainer" class="hidden">
            <h3>間違えた問題：</h3>
            <ul id="missedQuestionsList"></ul>
        </div>
        <div>
            <input type="text" id="userInitials" placeholder="イニシャルを入力してください。" class="userInitials hidden" required maxlength="3"/>
        <button type="button" class="logButton hidden" id="logButton">記録する</button>
        <div class="highScoresContainer hidden" id="highScoresContainer"><ul id="highScores"></ul></div>
        </div>

        </div>

    </main>
    <script type="text/javascript" src="assets/js/script.js"></script>
</body>
</html>
